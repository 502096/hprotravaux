<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demande envoyée — Hpro Travaux</title>
  <style>
    @font-face {
      font-family: 'Zekton';
      src: url('/fonts/Zekton-Regular.otf') format('opentype');
      font-weight: 400 700;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Zekton', system-ui, sans-serif;
      background: #111309;
      color: #F5F0E8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      text-align: center;
    }

    .card {
      background: #1C1F14;
      border: 1px solid rgba(201,125,22,0.2);
      border-radius: 24px;
      padding: clamp(2rem, 6vw, 3.5rem) clamp(1.5rem, 6vw, 3.5rem);
      max-width: 520px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.4);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%; height: 2px;
      background: linear-gradient(90deg, transparent, #C97D16, transparent);
      border-radius: 0 0 4px 4px;
    }

    .icon-wrap {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(201,125,22,0.12);
      border: 2px solid rgba(201,125,22,0.35);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.75rem;
    }

    .icon-wrap svg {
      width: 32px; height: 32px;
      stroke: #C97D16;
      stroke-width: 2.2;
      fill: none;
    }

    .tag {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #C97D16;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #ffffff;
      margin-bottom: 1rem;
    }

    p {
      font-size: 0.92rem;
      color: rgba(245,240,232,0.58);
      line-height: 1.7;
      margin-bottom: 0.5rem;
    }

    .highlight {
      color: rgba(245,240,232,0.82);
      font-weight: 600;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 1.75rem 0;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .stat-item { text-align: center; }

    .stat-num {
      font-size: 1.3rem;
      font-weight: 700;
      color: #C97D16;
      display: block;
    }

    .stat-label {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.38);
      display: block;
      margin-top: 0.2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #C97D16;
      color: #000;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      border: none;
      border-radius: 99px;
      padding: 0.85rem 1.8rem;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn:hover { background: #b86e10; transform: translateY(-2px); }
    .btn:active { transform: scale(0.97); }

    .logo {
      margin-bottom: 2.5rem;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: rgba(245,240,232,0.5);
    }

    .logo span { color: #C97D16; }
  </style>
</head>
<body>

  <div class="logo">HPRO <span>TRAVAUX</span></div>

  <div class="card">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    </div>

    <div class="tag">Demande reçue</div>

    <h1>Merci pour votre<br>demande de devis !</h1>

    <p>Votre message a bien été transmis à notre équipe.</p>
    <p class="highlight">Nous vous recontacterons sous 24h ouvrés.</p>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat-item">
        <span class="stat-num">24h</span>
        <span class="stat-label">Délai de réponse</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">Gratuit</span>
        <span class="stat-label">Sans engagement</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">250+</span>
        <span class="stat-label">Chantiers livrés</span>
      </div>
    </div>

    <a class="btn" href="/">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
      </svg>
      Retour à l'accueil
    </a>

  </div>

</body>
</html>
